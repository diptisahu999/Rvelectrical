name: rvelectricals CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy via SSH with password
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd /home/odoo-docker/rvelectrical/addons

            echo "🔄 Pulling the latest changes from GitHub..."
            git pull origin main
            echo "✅ Git pull completed successfully."

            echo "🚀 Restarting Docker container..."
            docker restart rvelectrical
            echo "🟢 Docker container restarted successfully."
          EOF
